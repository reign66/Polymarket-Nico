cycle_interval_minutes: 30
api_limits:
  max_haiku_calls_per_day: 100
  max_haiku_classify_per_day: 0
  max_sonnet_calls_per_day: 20
  max_monthly_cost_eur: 5
filters:
  min_volume_usd: 1000
  max_spread: 0.15
  min_hours_to_resolution: 0.25
  max_days_to_resolution: 999
  min_price: 0.04       # V2.3: raised from 0.02 — avoid sub-4¢ longshots (postmortem pos 4 & 17)
  max_price: 0.96       # V2.3: also avoids sub-4¢ NO markets (price > 96¢)
  low_price_warning: 0.08  # V2.3: log a warning when entry price < 8¢
  price_change_threshold: 0.02
  min_math_edge: 0.03
  min_math_confidence: 0.25   # V2.3: baissé de 0.45 → GenericModel (conf=0.30) peut maintenant passer
  min_confirmed_edge: 0.03
  min_final_edge: 0.06
kelly:
  fraction: 0.25
  max_bet_pct: 0.05
risk:
  daily_loss_limit_pct: 0.10
  weekly_drawdown_limit_pct: 0.25
  max_open_positions: 20
  small_cap_daily_pct: 0.95
  standard_daily_pct: 0.95
exit:
  take_profit_pct: 0.20
  stop_loss_pct: 0.15
  near_resolution_hours: 48
niches:
  nba:
    cycle_weight: 1.0
  f1:
    cycle_weight: 1.0
  crypto:
    cycle_weight: 1.0
  geopolitics:
    cycle_weight: 0.7
  politics:
    cycle_weight: 0.8
  golf:
    cycle_weight: 0.8
  soccer:
    cycle_weight: 0.8
  mma:
    cycle_weight: 0.7
  entertainment:
    cycle_weight: 0.5
  science:
    cycle_weight: 0.5
  tech:
    cycle_weight: 0.6
  other:
    cycle_weight: 0.3
